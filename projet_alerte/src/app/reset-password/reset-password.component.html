<div class="reset-container">
  <div class="reset-card">
    <div class="reset-header">
      <h2>Réinitialisation</h2>
      <p *ngIf="!successMessage">Veuillez saisir votre nouveau mot de passe pour sécuriser votre compte.</p>
    </div>

    <!-- Success Message -->
    <div class="alert alert-success" *ngIf="successMessage">
      {{ successMessage }}
      <p>Redirection vers la page de connexion...</p>
    </div>

    <!-- Error Message -->
    <div class="alert alert-danger" *ngIf="errorMessage">
      {{ errorMessage }}
    </div>

    <form [formGroup]="resetForm" (ngSubmit)="onSubmit()" *ngIf="!successMessage && token">
      <div class="form-group">
        <label for="password">Nouveau mot de passe</label>
        <input 
          type="password" 
          id="password" 
          formControlName="password" 
          class="form-control"
          placeholder="Min. 8 caractères"
        >
        <div class="error-hint" *ngIf="resetForm.get('password')?.touched && resetForm.get('password')?.invalid">
          Le mot de passe doit faire au moins 8 caractères.
        </div>
      </div>

      <div class="form-group">
        <label for="confirmPassword">Confirmez le mot de passe</label>
        <input 
          type="password" 
          id="confirmPassword" 
          formControlName="confirmPassword" 
          class="form-control"
        >
        <div class="error-hint" *ngIf="resetForm.hasError('mismatch') && resetForm.get('confirmPassword')?.touched">
          Les mots de passe ne correspondent pas.
        </div>
      </div>

      <button type="submit" [disabled]="resetForm.invalid || isLoading" class="btn btn-primary">
        <span *ngIf="!isLoading">Valider le nouveau mot de passe</span>
        <span *ngIf="isLoading" class="spinner">Chargement...</span>
      </button>
    </form>

    <div *ngIf="!token" class="mt-3">
      <a routerLink="/login" class="back-link">Retour à la connexion</a>
    </div>
  </div>
</div>
